<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#090b10">
  <title>Assistir | Minha Stream</title>
  <link rel="stylesheet" href="/assets/styles.css?v=20260724-10.5">
</head>
<body class="watch-page">
  <header class="topbar">
    <a class="brand" href="/">MINHA<span>STREAM</span></a>
    <div class="top-actions">
      <a id="seriesBackButton" class="ghost-button hidden" href="#">Temporadas</a>
      <a class="ghost-button" href="/">← Catálogo</a>
    </div>
  </header>

  <main class="watch-main">
    <section class="player-shell unified-player-shell">
      <div id="playerMount" class="player-mount unified-player" tabindex="0">
        <video
          id="unifiedVideo"
          class="unified-player-video"
          playsinline
          preload="metadata"
        ></video>

        <div id="playerLoading" class="unified-player-loading">
          <span></span>
          <b>Preparando vídeo…</b>
        </div>

        <button
          id="playerBigPlay"
          class="unified-player-big-play hidden"
          type="button"
          aria-label="Reproduzir"
        >▶</button>

        <div class="unified-player-gradient"></div>

        <div id="playerControls" class="unified-player-controls">
          <button
            id="playerPlayPause"
            class="unified-player-control-button"
            type="button"
            aria-label="Reproduzir"
          >▶</button>

          <span id="playerCurrentTime" class="unified-player-time">0:00</span>

          <input
            id="playerProgress"
            class="unified-player-progress"
            type="range"
            min="0"
            max="1000"
            value="0"
            step="1"
            aria-label="Posição do vídeo"
          >

          <span id="playerDuration" class="unified-player-time">0:00</span>

          <button
            id="playerMute"
            class="unified-player-control-button"
            type="button"
            aria-label="Silenciar"
          >🔊</button>

          <input
            id="playerVolume"
            class="unified-player-volume"
            type="range"
            min="0"
            max="1"
            value="1"
            step="0.05"
            aria-label="Volume"
          >

          <button
            id="playerFullscreen"
            class="unified-player-control-button"
            type="button"
            aria-label="Tela cheia"
          >⛶</button>
        </div>
      </div>
    </section>

    <section class="watch-details">
      <div>
        <p id="watchEyebrow" class="eyebrow"></p>
        <h1 id="watchTitle">Carregando…</h1>
        <p id="watchMeta" class="watch-meta"></p>
        <p id="watchDescription" class="watch-description"></p>
      </div>
      <button id="favoriteButton" class="ghost-button" type="button">♡ Favoritar</button>
    </section>

    <section id="relatedEpisodes" class="watch-episodes hidden">
      <div class="section-heading compact">
        <div>
          <p class="eyebrow">TEMPORADAS E EPISÓDIOS</p>
          <h2>Escolha pela capa</h2>
        </div>
      </div>

      <div id="watchSeasonTabs" class="season-tabs watch-season-tabs" aria-label="Escolher temporada"></div>

      <div class="episode-nav-row">
        <a id="previousEpisode" class="ghost-button hidden" href="#">← Episódio anterior</a>
        <a id="nextEpisode" class="ghost-button hidden" href="#">Próximo episódio →</a>
      </div>

      <div id="watchEpisodeList" class="watch-episode-cards"></div>
    </section>

    <div id="watchError" class="error-box hidden"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
  <script src="/assets/watch.js?v=20260724-10.5" defer></script>
</body>
</html>

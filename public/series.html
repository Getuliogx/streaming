<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#090b10">
  <title>Série | Minha Stream</title>
  <link rel="stylesheet" href="/assets/styles.css?v=20260724-10">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">MINHA<span>STREAM</span></a>
    <div class="top-actions">
      <a class="ghost-button" href="/">← Catálogo</a>
    </div>
  </header>

  <main id="seriesPage" class="series-main">
    <section id="seriesHero" class="series-hero">
      <div class="series-hero-shade"></div>
      <div class="series-info">
        <div id="seriesPoster" class="series-poster"></div>
        <div>
          <p class="eyebrow">SÉRIE</p>
          <h1 id="seriesTitle">Carregando…</h1>
          <p id="seriesMeta" class="watch-meta"></p>
          <p id="seriesDescription" class="watch-description"></p>
        </div>
      </div>
    </section>


    <section id="seriesPlayerSection" class="series-player-section">
      <div class="player-shell">
        <div id="seriesPlayerMount" class="player-mount">
          <div class="loading">Escolha um episódio.</div>
        </div>
      </div>

      <div class="series-player-details">
        <div>
          <p id="seriesPlayerEyebrow" class="eyebrow">EPISÓDIO</p>
          <h2 id="seriesPlayerTitle">Escolha um episódio</h2>
          <p id="seriesPlayerMeta" class="watch-meta"></p>
          <p id="seriesPlayerDescription" class="watch-description"></p>
        </div>

        <div class="series-player-actions">
          <button id="previousSeriesEpisode" class="ghost-button hidden" type="button">← Episódio anterior</button>
          <button id="nextSeriesEpisode" class="ghost-button hidden" type="button">Próximo episódio →</button>
        </div>
      </div>
    </section>

    <section class="episodes-section">
      <div class="section-heading compact">
        <div>
          <p class="eyebrow">EPISÓDIOS</p>
          <h2>Escolha um episódio para trocar o vídeo no player acima</h2>
        </div>
      </div>

      <div id="seasonTabs" class="season-tabs" aria-label="Temporadas"></div>
      <div id="episodeGrid" class="episode-visual-grid"></div>
      <div id="seriesError" class="error-box hidden"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
  <script src="/assets/series.js?v=20260724-10" defer></script>
</body>
</html>
